<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background-color: #e0e0e0;
            border-color: #999;
        }

        .btn-danger {
            background-color: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background-color: #ee5a52;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            margin-bottom: 20px;
            border: 3px solid #333;
            background-color: #333;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            background-color: white;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
        }

        .cell.given {
            background-color: #f0f0f0;
            color: #000;
            font-weight: 900;
            cursor: default;
        }

        .cell.selected {
            background-color: #667eea;
            color: white;
        }

        .cell.related {
            background-color: #e8eef7;
        }

        .cell.error {
            background-color: #ffebee;
        }

        .cell.given.related {
            background-color: #ddd;
        }

        .cell:nth-child(3n)::after,
        .cell:nth-child(6n)::after {
            content: '';
        }

        .board > .cell:nth-child(n + 28):nth-child(-n + 27)::after,
        .board > .cell:nth-child(n + 55):nth-child(-n + 54)::after {
            content: '';
        }

        .board .cell:nth-child(3n) {
            border-right: 3px solid #333;
        }

        .board .cell:nth-child(9n) {
            border-right: none;
        }

        .board .cell:nth-child(n + 1):nth-child(-n + 9) {
            border-top: 3px solid #333;
        }

        .board .cell:nth-child(n + 1):nth-child(-n + 3),
        .board .cell:nth-child(n + 10):nth-child(-n + 12),
        .board .cell:nth-child(n + 19):nth-child(-n + 21) {
            border-left: 3px solid #333;
        }

        .board .cell:nth-child(n + 22):nth-child(-n + 27) {
            border-bottom: 3px solid #333;
        }

        .board .cell:nth-child(n + 49):nth-child(-n + 54) {
            border-bottom: 3px solid #333;
        }

        .board .cell:nth-child(n + 76):nth-child(-n + 81) {
            border-bottom: 3px solid #333;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .message {
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .difficulty-select {
            text-align: center;
            margin-bottom: 20px;
        }

        .difficulty-select label {
            margin-right: 10px;
            font-weight: bold;
        }

        .difficulty-select select {
            padding: 8px 12px;
            border-radius: 5px;
            border: 2px solid #ddd;
            font-size: 1em;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .cell {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }

            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 15px;
            }
        }

        .timer {
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sudoku</h1>
        <p class="subtitle">Solve the puzzle!</p>

        <div class="difficulty-select">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div id="message" class="message"></div>

        <div class="info">
            <div class="info-item">
                <div class="info-label">Time</div>
                <div class="info-value timer" id="timer">0:00</div>
            </div>
            <div class="info-item">
                <div class="info-label">Errors</div>
                <div class="info-value" id="errors">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Completed</div>
                <div class="info-value" id="completed">0/81</div>
            </div>
        </div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button class="btn-primary" onclick="newGame()">New Game</button>
            <button class="btn-secondary" onclick="undoMove()">Undo</button>
            <button class="btn-secondary" onclick="showHint()">Hint</button>
            <button class="btn-danger" onclick="clearBoard()">Clear</button>
        </div>
    </div>

    <script src="sudoku.js"></script>
</body>
</html>
